version: "2"
run:
  timeout: 5m
  go: 1.26.4
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
  tests: true
output:
  formats: {}
linters:
  enable:
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - clickhouselint
    - containedctx
    - contextcheck
    - copyloopvar
    - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - forbidigo
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    depguard:
      rules:
        cmd:
          allow:
            - $gostd
            - github.com/LarsArtmann/upd
            - github.com/larsartmann/go-error-family
          files:
            - "**/cmd/**"
        main:
          allow:
            - $gostd
            - github.com/LarsArtmann/upd
            - github.com/Masterminds/semver/v3
            - github.com/gobwas/glob
            - github.com/larsartmann/go-atomic-write
            - github.com/larsartmann/go-error-family
          files:
            - $all
            - "!$test"
            - "!**/cmd/**"
    exhaustruct:
      exclude:
        - os/exec.Cmd
        - net/http.Client
        - net/http.Transport
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    gomoddirectives:
      replace-local: true
    ireturn:
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
    makezero:
      always: true
    paralleltest:
      ignore-missing: true
      ignore-missing-subtests: true
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    testifylint:
      disable:
        - go-require
      enable-all: true
    varnamelen:
      ignore-map-index-ok: true
      ignore-names:
        - err
        - ok
        - tt
        - fn
        - t
        - i
        - j
        - k
        - m
        - "n"
        - g
        - a
        - b
        - c
        - ch
        - d
        - e
        - f
        - h
        - l
        - mu
        - p
        - q
        - r
        - s
        - sv
        - u
        - v
        - w
        - wg
        - x
        - "y"
        - z
      ignore-type-assert-ok: true
    wrapcheck:
      ignore-sig-regex-es:
        - ".*errorfamily\\."
      ignore-package-globs:
        - github.com/LarsArtmann/upd
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - exhaustruct
          - testpackage
          - gochecknoglobals
          - funlen
          - cyclop
          - goconst
          - gosec
          - wsl_v5
          - nlreturn
          - noinlineerr
          - prealloc
          - mnd
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - _templ\.go$
      - \.gen\.go$
      - vendor/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _templ\.go$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
