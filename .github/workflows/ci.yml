name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -ldflags="-s -w -X github.com/LarsArtmann/upd/internal.ProgramVersion=ci" -trimpath ./cmd/upd

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1
